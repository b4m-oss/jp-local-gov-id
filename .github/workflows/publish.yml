name: Publish

on:
  release:
    types: [published]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify repository.url for provenance
        run: |
          expected='https://github.com/b4m-oss/jp-local-gov-id'
          for pkg in packages/jp-local-gov-id-data packages/jp-local-gov-id; do
            url=$(node -p "require('./${pkg}/package.json').repository?.url ?? ''")
            echo "${pkg}: repository.url=${url}"
            if [ "$url" != "$expected" ]; then
              echo "::error::${pkg}/package.json repository.url must be exactly ${expected} (got: '${url}')"
              exit 1
            fi
          done

      - name: Publish @b4moss/jp-local-gov-id-data
        working-directory: packages/jp-local-gov-id-data
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @b4moss/jp-local-gov-id
        working-directory: packages/jp-local-gov-id
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
