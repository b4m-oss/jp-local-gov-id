name: Publish

# IMPORTANT:
# - Do NOT click "Re-run" on old failed jobs (they keep the old commit SHA).
# - Prefer "Run workflow" below after merging the latest main.
on:
  workflow_dispatch:
    inputs:
      package:
        description: Which package to publish
        required: true
        type: choice
        options:
          - data
          - api
          - both
        default: data

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show publish context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # Never cache for release builds
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish @b4moss/jp-local-gov-id-data
        if: ${{ inputs.package == 'data' || inputs.package == 'both' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          expected='https://github.com/b4m-oss/jp-local-gov-id'
          bad_shasum='55ed60a962a9b3b52942a4a77b5442fc6677239b'
          pkg_dir='packages/jp-local-gov-id-data'

          echo '=== package.json BEFORE inject ==='
          node -p "JSON.stringify(require('./${pkg_dir}/package.json').repository ?? null, null, 2)"

          node scripts/inject-repository.mjs "$pkg_dir"

          echo '=== package.json AFTER inject ==='
          node -p "JSON.stringify(require('./${pkg_dir}/package.json').repository, null, 2)"

          cd "$pkg_dir"
          tgz=$(npm pack --pack-destination . | tail -n1 | tr -d '\r')
          echo "packed=${tgz}"
          shasum_value=$(shasum -a 1 "$tgz" | awk '{print $1}')
          echo "shasum=${shasum_value}"

          tar -xOf "$tgz" package/package.json > /tmp/packed-data-package.json
          url=$(node -p "require('/tmp/packed-data-package.json').repository?.url ?? ''")
          echo "packed repository.url=${url}"
          cat /tmp/packed-data-package.json

          if [ "$url" != "$expected" ]; then
            echo "::error::Packed repository.url must be ${expected} (got '${url}')"
            exit 1
          fi
          if [ "$shasum_value" = "$bad_shasum" ]; then
            echo "::error::Packed tarball matches known-bad shasum without repository field"
            exit 1
          fi

          npm publish "$tgz" --access public --provenance

      - name: Publish @b4moss/jp-local-gov-id
        if: ${{ inputs.package == 'api' || inputs.package == 'both' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          expected='https://github.com/b4m-oss/jp-local-gov-id'
          pkg_dir='packages/jp-local-gov-id'

          node scripts/inject-repository.mjs "$pkg_dir"
          cd "$pkg_dir"
          tgz=$(npm pack --pack-destination . | tail -n1 | tr -d '\r')
          echo "packed=${tgz}"

          tar -xOf "$tgz" package/package.json > /tmp/packed-api-package.json
          url=$(node -p "require('/tmp/packed-api-package.json').repository?.url ?? ''")
          echo "packed repository.url=${url}"

          if [ "$url" != "$expected" ]; then
            echo "::error::Packed repository.url must be ${expected} (got '${url}')"
            exit 1
          fi

          npm publish "$tgz" --access public --provenance
