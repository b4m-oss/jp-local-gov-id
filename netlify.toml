[build]
  command = "npm run build:site"
  publish = "site/.output/public"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "static"
  # Optional: set NUXT_PUBLIC_SCRIPTS_GOOGLE_ANALYTICS_ID in Netlify UI (build-time for SSG)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
